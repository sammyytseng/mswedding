  <!-- ==========================================
       表單處理與資安強化邏輯 (JavaScript)
  ========================================== -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 處理 Lucide Icons
      if(typeof lucide !== 'undefined') { lucide.createIcons(); }

      // --- 孩童選單展開邏輯 ---
      const bringKidsSelect = document.getElementById('bringKids');
      const kidsSection = document.getElementById('kidsSection');
      if(bringKidsSelect && kidsSection) {
        bringKidsSelect.addEventListener('change', (e) => {
          if (e.target.value === 'yes') {
            kidsSection.classList.remove('max-h-0', 'opacity-0');
            kidsSection.classList.add('max-h-40', 'opacity-100');
          } else {
            kidsSection.classList.remove('max-h-40', 'opacity-100');
            kidsSection.classList.add('max-h-0', 'opacity-0');
          }
        });
      }

      // --- 資安強化：前端 HTML 消毒函數 ---
      const sanitizeInput = (str) => {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, 
          tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
        );
      };

      // --- 表單送出邏輯 ---
      const rsvpForm = document.getElementById('rsvpForm');
      const submitBtn = document.getElementById('submitBtn');

      if(rsvpForm) {
        rsvpForm.addEventListener('submit', (e) => {
          e.preventDefault(); 
          
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="animate-pulse">Sending...</span>';
          submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

          const formData = new FormData(rsvpForm);
          const isBringingKids = formData.get('bringKids') === 'yes';
          
          // 收集並進行前端消毒
          const data = {
            name: sanitizeInput(formData.get('name')),
            phone: sanitizeInput(formData.get('phone')),
            relation: formData.get('relation'),
            guests: formData.get('guests'),
            bringKids: isBringingKids ? '是' : '否',
            kidsOver3: isBringingKids ? formData.get('kidsOver3') : '0',
            kidsUnder3: isBringingKids ? formData.get('kidsUnder3') : '0',
            diet: formData.get('diet'),
            message: sanitizeInput(formData.get('message'))
          };

          // 已經為您換上最新版的 Google Apps Script 網址
          const GAS_URL = 'https://script.google.com/macros/s/AKfycbzlRcQq8uxGuN4QbI7GJBQ8HECxCvWobeH5vHIeTh7DtskCd_jF30c0EnnS67Yh3VK7bg/exec';

          fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免 CORS 預檢
            body: JSON.stringify(data)
          })
          .then(response => {
            // 成功：優雅切換畫面
            rsvpForm.innerHTML = `
              <div class="flex flex-col items-center justify-center py-20 animate-pulse">
                <h3 class="text-4xl font-extralight italic text-[#3d4d38] mb-4" style="font-family: 'Great Vibes', cursive;">Thank You !</h3>
                <p class="text-[10px] tracking-[0.4em] opacity-60 uppercase">我們已收到您的回覆，期待與您相見。</p>
              </div>
            `;
          })
          .catch(error => {
            // 失敗：不使用 alert，改用 UI 提示
            submitBtn.innerHTML = '傳送失敗，請重試 (Retry)';
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            submitBtn.classList.add('bg-red-800'); // 變更按鈕顏色提示錯誤
            submitBtn.disabled = false;
            
            setTimeout(() => {
              submitBtn.innerHTML = 'Send RSVP';
              submitBtn.classList.remove('bg-red-800');
            }, 3000);
          });
        });
      }
    });
  </script>
