<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ray & Sophia Wedding Invitation</title>
  
  <!-- 載入 React 與 Babel (讓瀏覽器能看懂 React 語法) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <!-- 載入 Tailwind CSS (網頁排版樣式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 隱藏捲軸但保持滾動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 質感動畫定義 */
    @keyframes pulse-slow { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
    .animate-pulse-delayed { animation: pulse-slow 4s ease-in-out 1.5s infinite; }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 20s linear infinite; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-[#fdfaf6] text-[#3d4d38] font-serif selection:bg-[#9db193] selection:text-white overflow-x-hidden m-0 p-0">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 內建圖示組件 (解決 GitHub 無法載入外部套件的問題)
    // ==========================================
    const Heart = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    );
    const Calendar = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
    );
    const MapPin = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
    );
    const Clock = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    );
    const ChevronDown = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>
    );

    // ==========================================
    // 檔案路徑設定
    // ==========================================
    const ENVELOPE_IMAGE_URL = "./envelope.png"; 
    const YOUR_VIDEO_URL = "./Video1.mp4";       

    const App = () => {
      const [isOpened, setIsOpened] = useState(false);
      const [isEnvelopeGone, setIsEnvelopeGone] = useState(false); 
      const [canScroll, setCanScroll] = useState(false); 
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      
      const section2Ref = useRef(null); 

      useEffect(() => {
        const weddingDate = new Date('2026-10-10T12:00:00').getTime();
        const timer = setInterval(() => {
          const now = new Date().getTime();
          const distance = weddingDate - now;
          setTimeLeft({
            days: Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24))),
            hours: Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))),
            minutes: Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))),
            seconds: Math.max(0, Math.floor((distance % (1000 * 60)) / 1000)),
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const handleOpen = () => {
        setIsOpened(true);
        setTimeout(() => {
          setIsEnvelopeGone(true);
          setCanScroll(true); 
        }, 1500);
      };

      const scrollToNext = () => {
        if (section2Ref.current) {
          section2Ref.current.scrollIntoView({ behavior: 'smooth' });
        }
      };

      return (
        <div className="relative w-full">
          {/* ==========================================
              圖層 2：信封展示與拆封動畫
          ========================================== */}
          {!isEnvelopeGone && (
            <div 
              className={`fixed inset-0 flex items-center justify-center overflow-hidden z-[50] transition-colors duration-[1500ms] ${isOpened ? 'bg-transparent pointer-events-none' : 'bg-[#fdfaf6]'}`}
            >
              <div 
                className={`relative w-screen h-[100dvh] transition-all duration-[1500ms] cubic-bezier(0.4, 0, 0.2, 1) cursor-pointer
                  ${isOpened ? 'scale-[4.5] opacity-0 blur-3xl' : 'scale-100 hover:scale-[1.01]'}`}
                onClick={handleOpen}
              >
                <img 
                  src={ENVELOPE_IMAGE_URL} 
                  alt="Invitation Envelope" 
                  className="w-full h-full object-cover scale-[1.15] select-none pointer-events-none" 
                  onError={(e) => { e.target.style.display = 'none'; }} 
                />
                
                <div className="absolute inset-0 w-full h-full bg-[#9db193] -z-10"></div>
                
                <div className={`absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-opacity duration-500 ${isOpened ? 'opacity-0' : 'opacity-100'}`}>
                  <div className="w-32 h-32 rounded-full absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                     <div className="absolute w-full h-full rounded-full border-2 border-white opacity-20 animate-ping"></div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ==========================================
              圖層 1：主網頁內容 (Joucos 磁吸滾動架構)
          ========================================== */}
          <div 
            className={`w-full h-[100dvh] scroll-smooth hide-scrollbar ${canScroll ? 'overflow-y-auto snap-y snap-mandatory' : 'overflow-hidden'}`}
          >
            
            {/* 第 1 頁：純背景影片區塊 */}
            <section className="relative w-full h-[100dvh] bg-black snap-start shrink-0 overflow-hidden pointer-events-none">
              <div 
                className="absolute inset-0 w-full h-full z-0"
                dangerouslySetInnerHTML={{
                  __html: `
                    <video 
                      src="${YOUR_VIDEO_URL}"
                      autoplay
                      loop
                      muted
                      playsinline
                      webkit-playsinline
                      x5-playsinline
                      disablePictureInPicture
                      style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9; pointer-events: none;"
                    ></video>
                  `
                }}
              />
              <div 
                onClick={scrollToNext}
                className={`absolute bottom-12 left-0 w-full flex flex-col items-center justify-center transition-opacity duration-[1500ms] z-20 cursor-pointer pointer-events-auto ${isOpened ? 'opacity-80' : 'opacity-0 pointer-events-none'}`}
              >
                 <p className="text-white text-[9px] uppercase tracking-[0.4em] mb-4 drop-shadow-md">Scroll to reveal</p>
                 <ChevronDown size={24} className="text-white animate-bounce drop-shadow-md" />
              </div>
            </section>

            {/* 第 2 頁：名字與倒數計時區塊 */}
            <section ref={section2Ref} className="relative w-full h-[100dvh] flex flex-col items-center justify-center text-center px-4 bg-[#fdfaf6] snap-start shrink-0">
              <nav className="absolute top-0 w-full p-10 flex justify-between items-center pointer-events-none">
                <div className="text-[11px] tracking-[0.8em] font-bold uppercase opacity-40 italic">R & S | 2026</div>
                <div className="w-10 h-10 rounded-full border border-[#9db193] border-opacity-30 flex items-center justify-center animate-spin-slow">
                  <Heart size={12} className="opacity-30" />
                </div>
              </nav>

              <div className="z-10 space-y-12">
                <p className="text-[10px] tracking-[1.5em] uppercase mb-4 opacity-40 italic">Forever Begins Today</p>
                <h1 className="text-6xl md:text-[9rem] font-extralight italic text-[#3d4d38] tracking-tighter leading-none">Ray & Sophia</h1>
                <div className="h-[1px] w-24 bg-[#9db193] mx-auto my-14 opacity-20"></div>
                
                <div className="flex gap-10 md:gap-20 justify-center pt-10">
                  {Object.entries(timeLeft).map(([label, value]) => (
                    <div key={label} className="flex flex-col items-center">
                      <span className="text-4xl md:text-6xl font-extralight text-[#3d4d38]">{value}</span>
                      <span className="text-[9px] uppercase tracking-[0.4em] opacity-40 mt-4">{label}</span>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* 第 3 頁：婚禮資訊與頁尾 */}
            <section className="w-full min-h-[100dvh] flex flex-col justify-between bg-[#9db193] text-[#fdfaf6] snap-start shrink-0">
              <div className="flex-grow flex items-center justify-center py-20 px-6">
                <div className="max-w-6xl w-full grid md:grid-cols-3 gap-24 text-center">
                  <div className="space-y-6">
                    <Calendar size={32} className="mx-auto opacity-40 mb-2" />
                    <h3 className="text-[10px] tracking-[0.6em] font-bold opacity-60 uppercase">The Date</h3>
                    <p className="text-3xl font-light tracking-wide">2026.10.10 (Sat)</p>
                  </div>
                  <div className="space-y-6">
                    <MapPin size={32} className="mx-auto opacity-40 mb-2" />
                    <h3 className="text-[10px] tracking-[0.6em] font-bold opacity-60 uppercase">The Venue</h3>
                    <p className="text-3xl font-light tracking-wide">翡翠森林大酒店</p>
                  </div>
                  <div className="space-y-6">
                    <Clock size={32} className="mx-auto opacity-40 mb-2" />
                    <h3 className="text-[10px] tracking-[0.6em] font-bold opacity-60 uppercase">Dress Code</h3>
                    <p className="text-3xl font-light tracking-wide">莫蘭迪系 / 綠與白</p>
                  </div>
                </div>
              </div>
              
              <footer className="w-full py-16 bg-[#fdfaf6] text-[#3d4d38] text-center opacity-80 text-[10px] tracking-[1.5em] uppercase">
                Ray & Sophia | Always & Forever
              </footer>
            </section>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
