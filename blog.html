<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高質感歐式信封點擊動畫</title>
    <style>
        :root {
            /* 調整這裡可以換顏色：主色、深色調（陰影）、卡片色 */
            --env-color: #df6757;
            --env-dark: #cc5444;
            --env-light: #ea796a;
            --card-bg: #fffdf9;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4edd2; /* 復古米色背景 */
            perspective: 1000px; /* 開啟 3D 空間透視 */
        }

        /* 整個信封的外部容器（用來做微幅懸浮陰影） */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.15));
            transition: transform 0.3s ease;
        }

        .envelope-container:hover {
            transform: translateY(-5px);
        }

        /* 信封本體 */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--env-dark);
            border-radius: 6px;
        }

        /* 歐式深 V 上蓋 */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 運用 clip-path 裁切出完美的歐式 V 型斜角 */
            clip-path: polygon(0 0, 100% 0, 50% 62%);
            background: linear-gradient(to bottom, var(--env-light), var(--env-color));
            transform-origin: top;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.3s;
            z-index: 4; /* 一開始蓋在最外面 */
        }

        /* 信封底部的左右兩側折疊（歐式口袋視覺） */
        .pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 裁切出左右與下方包覆的 V 型口袋 */
            clip-path: polygon(0 35%, 50% 60%, 100% 35%, 100% 100%, 0 100%);
            background: linear-gradient(to top, var(--env-dark), var(--env-color));
            z-index: 3;
            border-radius: 0 0 6px 6px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.08);
        }

        /* 內藏的高質感卡片 */
        .card {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            height: 85%;
            background: var(--card-bg);
            border-radius: 4px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.6s;
            z-index: 2; /* 藏在 pocket 後面，flap 下面 */
            
            /* 卡片內容置中與美化 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #f2e6d0;
        }

        /* 卡片精緻內框與文字樣式 */
        .card-content {
            border: 1px dashed #df6757;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4a4a4a;
            font-family: 'Georgia', serif;
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--env-dark);
        }

        .card p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #666;
        }

        /* 封蠟章/貼紙（點綴用，不需要也可以刪除） */
        .sticker {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background-color: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            z-index: 5;
            transition: opacity 0.2s, transform 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        /* --- 點擊打開後的狀態處理 --- */

        /* 1. 封蠟章消失 */
        .envelope-container.open .sticker {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            pointer-events: none;
        }

        /* 2. 上蓋向上 3D 翻轉 180 度 */
        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* 翻開後層級降到最底，不擋卡片 */
        }

        /* 3. 卡片滑出：先往上抽，並大幅提升層級蓋在最前方 */
        .envelope-container.open .card {
            transform: translateY(-110px) scale(1.02); /* 向上滑出並微微放大 */
            z-index: 5; /* 躍升到最前層 */
            transition-delay: 0.15s; /* 稍微等上蓋翻起再滑出，視覺更流暢 */
        }
    </style>
</head>
<body>

    <!-- 信封外層容器 -->
    <div class="envelope-container" id="myEnvelope" onclick="openEnvelope()">
        <div class="envelope">
            <!-- 歐式上蓋 -->
            <div class="flap"></div>
            
            <!-- 封蠟章貼紙 -->
            <div class="sticker">✨</div>
            
            <!-- 精緻卡片 -->
            <div class="card">
                <div class="card-content">
                    <h2>For You</h2>
                    <p>最真摯的祝福</p>
                    <p>願你擁有美好的一天</p>
                </div>
            </div>
            
            <!-- 下方與兩側口袋 -->
            <div class="pocket"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.getElementById('myEnvelope');
            env.classList.toggle('open');
        }
    </script>

</body>
</html>
