<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray & Sophia Wedding Invitation</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; margin: 0; padding: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
        .animate-pulse-delayed { animation: pulse-slow 4s ease-in-out 1.5s infinite; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }
        
        /* 強制隱藏原生播放控制項 */
        video::-webkit-media-controls { display: none !important; }
        
        /* 深度壓紋濾鏡 */
        .deboss-effect { filter: url(#deboss-filter); }
        
        /* 影片淡出動畫 */
        .video-fade-out {
            animation: cinematicFade 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            will-change: opacity;
        }
        @keyframes cinematicFade {
            0% { opacity: 0.9; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="deboss-filter">
                <feOffset dx="-1" dy="-1" in="SourceAlpha" result="offset-top"/>
                <feGaussianBlur stdDeviation="1" in="offset-top" result="blur-top"/>
                <feFlood flood-color="#ffffff" flood-opacity="0.3" result="color-top"/>
                <feComposite operator="in" in="color-top" in2="blur-top" result="highlight"/>
                <feOffset dx="1" dy="1" in="SourceAlpha" result="offset-bottom"/>
                <feGaussianBlur stdDeviation="1" in="offset-bottom" result="blur-bottom"/>
                <feFlood flood-color="#000000" flood-opacity="0.2" result="color-bottom"/>
                <feComposite operator="in" in="color-bottom" in2="blur-bottom" result="shadow"/>
                <feMerge>
                    <feMergeNode in="highlight"/>
                    <feMergeNode in="shadow"/>
                </feMerge>
            </filter>
            <filter id="wax-3d">
                <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
                <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="35" lightingColor="#ffffff" result="spec">
                    <fePointLight x="-40" y="-40" z="100" />
                </feSpecularLighting>
                <feComposite in="spec" in2="SourceAlpha" operator="in" result="specIn" />
                <feComposite in="SourceGraphic" in2="specIn" operator="over" />
            </filter>
        </defs>
    </svg>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Heart = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        const Calendar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        );
        const MapPin = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const Clock = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        );
        const ChevronDown = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>
        );

        const App = () => {
            const [isGenerating, setIsGenerating] = useState(true);
            const [loadingProgress, setLoadingProgress] = useState(0);
            const [isOpened, setIsOpened] = useState(false);
            const [isEnvelopeGone, setIsEnvelopeGone] = useState(false);
            const [isVideoFadingOut, setIsVideoFadingOut] = useState(false);
            const [isVideoGone, setIsVideoGone] = useState(false);
            const [canScroll, setCanScroll] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            
            const videoRef = useRef(null);
            const section2Ref = useRef(null);

            useEffect(() => {
                const interval = setInterval(() => {
                    setLoadingProgress(prev => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            return 100;
                        }
                        return Math.min(prev + (Math.random() * 1.5 + 0.5), 100);
                    });
                }, 50);
                setTimeout(() => setIsGenerating(false), 4000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const weddingDate = new Date('2026-10-10T12:00:00').getTime();
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = weddingDate - now;
                    setTimeLeft({
                        days: Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24))),
                        hours: Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))),
                        minutes: Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))),
                        seconds: Math.max(0, Math.floor((distance % (1000 * 60)) / 1000)),
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const handleOpen = () => {
                setIsOpened(true);
                if (videoRef.current) {
                    videoRef.current.play().catch(e => console.log(e));
                }
                setTimeout(() => { setIsEnvelopeGone(true); }, 1500);
            };

            const handleTimeUpdate = () => {
                if (videoRef.current) {
                    const { currentTime, duration } = videoRef.current;
                    if (duration > 0 && duration - currentTime <= 0.2) {
                        videoRef.current.pause();
                        setTimeout(() => {
                            setIsVideoFadingOut(true);
                            setCanScroll(true);
                            setTimeout(() => { setIsVideoGone(true); }, 3500);
                        }, 500);
                    }
                }
            };

            const scrollToNext = () => {
                if (section2Ref.current) section2Ref.current.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className={`relative w-full text-[#3d4d38] ${!canScroll ? 'h-[100dvh] overflow-hidden' : 'min-h-screen'}`}>
                    
                    {/* 載入畫面 */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-[#fdfaf6] flex flex-col items-center justify-center p-8 text-center z-[100]">
                            <div className="relative w-64 h-[1.5px] mb-16 bg-[#9db193] bg-opacity-15 overflow-hidden rounded-full">
                                <div className="absolute top-0 left-0 h-full bg-[#9db193] transition-all duration-300" style={{ width: `${loadingProgress}%` }}></div>
                            </div>
                            <div className="space-y-6">
                                <h2 className="text-[#9db193] italic text-2xl tracking-[0.4em] uppercase animate-pulse-slow">Sealing our love...</h2>
                                <p className="text-[#9db193] text-[10px] uppercase tracking-[0.6em] opacity-60">A message from the heart is being prepared</p>
                            </div>
                        </div>
                    )}

                    {/* 信封圖層 (高度還原 AI 設計) */}
                    {!isGenerating && !isEnvelopeGone && (
                        <div className={`fixed inset-0 flex items-center justify-center z-[50] transition-colors duration-[1500ms] ${isOpened ? 'bg-transparent pointer-events-none' : 'bg-[#fdfaf6]'}`}>
                            <div className={`relative w-screen h-[100dvh] transition-all duration-[1800ms] cubic-bezier(0.4, 0, 0.2, 1) cursor-pointer ${isOpened ? 'scale-[4.5] opacity-0 blur-3xl' : 'scale-100'}`} onClick={handleOpen}>
                                
                                {/* 手繪極致質感信封 */}
                                <div className="absolute inset-0 bg-[#9db193] flex items-center justify-center overflow-hidden">
                                    <svg width="100%" height="100%" className="absolute inset-0 opacity-40">
                                        <g className="deboss-effect" stroke="#3d4d38" strokeWidth="1" fill="none">
                                            {/* 鼠尾草綠壓紋花草圖案 */}
                                            <path d="M50,100 Q150,50 250,100 T450,100" />
                                            <path d="M-50,300 Q100,250 250,350 T550,300" />
                                            <path d="M100,600 Q250,550 400,650" />
                                            <circle cx="150" cy="150" r="10" /><circle cx="350" cy="550" r="15" />
                                            <path d="M300,200 L320,150 M300,200 L280,150" />
                                        </g>
                                    </svg>
                                    {/* 立體 RS 蠟封 */}
                                    <div className="relative z-10 scale-125">
                                        <svg width="100" height="100" viewBox="0 0 100 100">
                                            <path d="M50,5 C70,3 85,15 90,35 C95,55 85,80 70,92 C50,100 25,95 10,75 C0,55 5,25 20,10 C30,5 40,7 50,5 Z" fill="#fdfaf6" filter="url(#wax-3d)" />
                                            <circle cx="50" cy="50" r="32" fill="none" stroke="#dcd7cd" strokeWidth="1" opacity="0.5" />
                                            <text x="50" y="62" textAnchor="middle" fill="#9e948a" style={{ fontFamily: 'Georgia, serif', fontStyle: 'italic', fontSize: '32px' }}>RS</text>
                                        </svg>
                                    </div>
                                </div>

                                <div className={`absolute bottom-12 w-full text-center transition-opacity duration-500 ${isOpened ? 'opacity-0' : 'opacity-100'}`}>
                                    <p className="text-white text-[11px] font-bold tracking-[1.5em] animate-pulse uppercase">Tap to unwrap our joy</p>
                                    <div className="w-[1px] h-10 bg-white opacity-20 mx-auto mt-6"></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 影片背景層 */}
                    {!isVideoGone && (
                        <div className={`fixed inset-0 bg-black z-[40] ${isVideoFadingOut ? 'video-fade-out' : ''}`}>
                            <video 
                                ref={videoRef}
                                className="w-full h-full object-cover opacity-90 pointer-events-none"
                                src="./Video1.mp4"
                                playsInline webkit-playsinline muted
                                onTimeUpdate={handleTimeUpdate}
                            ></video>
                        </div>
                    )}

                    {/* 名字與詳細資訊 (Joucos 滑動架構) */}
                    <main className={`relative w-full transition-opacity duration-1000 ${isVideoFadingOut || isVideoGone ? 'opacity-100' : 'opacity-0'}`}>
                        <section className="relative w-full h-[100dvh] flex flex-col items-center justify-center text-center px-4 bg-[#fdfaf6]">
                            <nav className="absolute top-0 w-full p-10 flex justify-between items-center">
                                <div className="text-[11px] tracking-[0.8em] font-bold uppercase opacity-40">R & S | 2026</div>
                                <div className="w-10 h-10 rounded-full border border-[#9db193] border-opacity-30 flex items-center justify-center animate-spin-slow"><Heart size={12} className="opacity-30" /></div>
                            </nav>
                            <div className="space-y-12">
                                <p className="text-[10px] tracking-[1.5em] uppercase opacity-40 italic">Forever Begins Today</p>
                                <h1 className="text-6xl md:text-[9rem] font-extralight italic leading-none">Ray & Sophia</h1>
                                <div className="h-[1px] w-24 bg-[#9db193] mx-auto my-14 opacity-20"></div>
                                <div className="flex gap-10 md:gap-20 justify-center">
                                    {Object.entries(timeLeft).map(([label, value]) => (
                                        <div key={label} className="flex flex-col items-center">
                                            <span className="text-4xl md:text-6xl font-extralight">{value}</span>
                                            <span className="text-[9px] uppercase tracking-[0.4em] opacity-40 mt-4">{label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="absolute bottom-12 w-full flex justify-center opacity-40 animate-bounce"><div className="w-[1px] h-12 bg-[#3d4d38]"></div></div>
                        </section>

                        <section className="bg-[#9db193] text-[#fdfaf6] py-40 px-6">
                            <div className="max-w-6xl mx-auto grid md:grid-cols-3 gap-24 text-center">
                                <div><Calendar className="mx-auto mb-6 opacity-40" size={32}/><p className="text-3xl font-light">2026.10.10 (Sat)</p></div>
                                <div><MapPin className="mx-auto opacity-40 mb-2" size={32}/><p className="text-3xl font-light">翡翠森林大酒店</p></div>
                                <div><Clock className="mx-auto opacity-40 mb-2" size={32}/><p className="text-3xl font-light">莫蘭迪系 / 綠與白</p></div>
                            </div>
                        </section>

                        <footer className="py-24 bg-[#fdfaf6] text-center border-t border-[#9db193] border-opacity-10 opacity-30 text-[10px] tracking-[1.5em] uppercase">Ray & Sophia | Always & Forever</footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
